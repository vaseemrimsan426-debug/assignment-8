<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styling/styling.css">

</head>

<body>
    <header>
        <h3>To Do List</h3>
    </header>

    <main>
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card shadow">
                        <div class="card-header bg-dark text-white">
                            <h2 class="text-center mb-1">My To Do List</h2>
                        </div> 
                        
                        <div class="card-body">
                            <div class="input-group mb-4">
                                <input type="text"  id = "taskInput" class="form-control" placeholder="Enter your task..."/>
                                <button class="addbtn btn-success" onclick="addTask()">ADD TASK</button>
                            </div>

                            <!-- <ul id="taskList" class="list-group"></ul> -->

                            <div id = "tasks-container">

                            </div>

                            <div class="text-center text-muted d-none" id = "message">
                                <p>No Task Assigned</p>
                            </div>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </main>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script src="./script.js"></script>
</body>

</html>
